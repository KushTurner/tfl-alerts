name: Build and Deploy TFL Alerts

env:
  APP_NAME: tfl-alerts

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Test
        run: make test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Increment Version
        id: versioning
        uses: paulhatch/semantic-version@v6.0.2
        with:
          tag_prefix: "v"
          major_pattern: "(major)"
          minor_pattern: "(minor)"
          version_format: "${major}.${minor}.${increment}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Add version to environment
        run: echo "APP_VERSION=${{ steps.versioning.outputs.version }}" >> $GITHUB_ENV

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/${{ env.APP_NAME }}:${{ env.APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Create .env File
        run: |
          echo "Generating .env file"

          echo "# Autogenerated .env file" > .env
          echo "APP_VERSION=${{ env.APP_VERSION }}" >> .env
          echo "REGISTRY=${{ secrets.DOCKER_USERNAME }}" >> .env
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
          echo "TWILIO_FROM=${{ secrets.TWILIO_FROM }}" >> .env
          echo "TWILIO_ACCOUNT_SID=${{ secrets.TWILIO_ACCOUNT_SID }}" >> .env
          echo "TWILIO_AUTH_TOKEN=${{ secrets.TWILIO_AUTH_TOKEN }}" >> .env

      - name: Copy Files To Server via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_HOST }}
          username: ${{ secrets.DEPLOYMENT_SSH_USER }}
          key: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          source: "./docker-compose.yml,./.env"
          target: "~/${{ github.event.repository.name }}/"

      - name: Start Application
        uses: appleboy/ssh-action@v1.2.5
        env:
          APPTOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ secrets.DEPLOY_USERNAME }}
        with:
          host: ${{ secrets.DEPLOYMENT_SSH_HOST }}
          username: ${{ secrets.DEPLOYMENT_SSH_USER }}
          key: ${{ secrets.DEPLOYMENT_SSH_KEY }}
          script: |
            echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
            cd ~/${{ github.event.repository.name }}
            docker compose down --remove-orphans
            docker compose up -d
            docker images "${{ secrets.DOCKER_USERNAME }}/tfl-alerts" \
            --format "{{.Tag}}" | \
            grep -v "^${{ env.APP_VERSION }}$" | \
            xargs -I {} docker rmi "${{ secrets.DOCKER_USERNAME }}/tfl-alerts:{}" || true
